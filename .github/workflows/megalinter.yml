name: MegaLinter Cupcake

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  mega-linter:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Run MegaLinter with cupcake flavor
        uses: oxsecurity/megalinter@v5
        with:
          flavor: cupcake
          report-mode: only-report
          comment-on-failure: true
          repo-token: ${{ secrets.GITHUB_TOKEN }}