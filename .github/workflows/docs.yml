name: Deploy docs to GitHub Pages

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, closed]

permissions:
  contents: write
  pull-requests: write
  statuses: write

jobs:
  build:
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || github.event.action != 'closed'
    steps:
      - uses: actions/checkout@v6

      - name: Build site with mkdocs
        run: |
          docker run --rm -v ${{ github.workspace }}:/docs \
            squidfunk/mkdocs-material build

      - name: Upload site artifact
        uses: actions/upload-artifact@v7
        with:
          name: site
          path: site

  deploy-root:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: site
          path: site

      - name: Deploy to gh-pages root
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: site
          publish_branch: gh-pages

      - name: Mark pages deployment successful
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api repos/${{ github.repository }}/statuses/${{ github.sha }} \
            -f state=success \
            -f description="Pages deploy successful" \
            -f context="Pages deploy"

      - name: Verify root deployment
        uses: actions/checkout@v6
        with:
          ref: gh-pages
          path: gh-pages-verify
      - name: Check site index
        run: |
          if [ -f "gh-pages-verify/index.html" ]; then
            echo "✅ Root deployment verified (index.html found)"
          else
            echo "❌ Root index.html missing"
          fi

  deploy-preview:
    if: github.event_name == 'pull_request' && github.event.action != 'closed'
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: site
          path: site

      - name: Deploy preview to gh-pages/preview/pr-${{ github.event.number }}
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: site
          publish_branch: gh-pages
          destination_dir: preview/pr-${{ github.event.number }}
          keep_files: true

      - name: Mark preview deployment successful
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api repos/${{ github.repository }}/statuses/${{ github.event.pull_request.head.sha }} \
            -f state=success \
            -f description="Preview deploy successful" \
            -f context="Preview deploy"

      - name: Post preview URL
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PREVIEW_URL="https://mibracy.github.io/gh-mkpage/preview/${{ github.event.number }}/"
          BODY="### 🔍 Preview deployed\n\n[$PREVIEW_URL]($PREVIEW_URL)"
          COMMENT_ID=$(gh api /repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments \
            --jq '.[] | select(.body | startswith("### 🔍 Preview deployed")) | .id' | head -1)
          if [ -n "$COMMENT_ID" ]; then
            gh api /repos/${{ github.repository }}/issues/comments/$COMMENT_ID \
              -X PATCH -f body="$BODY" > /dev/null
          else
            gh pr comment ${{ github.event.pull_request.number }} \
              --repo ${{ github.repository }} \
              --body "$BODY"
          fi

      - name: Verify preview folder on gh-pages
        uses: actions/checkout@v6
        with:
          ref: gh-pages
          path: gh-pages-verify
      - name: List preview files
        run: |
          DIR="preview/${{ github.event.number }}"
          if [ -d "gh-pages-verify/$DIR" ]; then
            echo "✅ Preview directory exists: $DIR"
            echo "Files:" && ls -la "gh-pages-verify/$DIR"
          else
            echo "❌ Preview directory NOT FOUND: $DIR"
          fi

  cleanup-preview:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: gh-pages
          path: gh-pages

      - name: Remove preview/pr-${{ github.event.number }}
        run: |
          cd gh-pages
          rm -rf preview/pr-${{ github.event.number }}
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add .
          git diff --cached --quiet || git commit -m "cleanup preview pr-${{ github.event.number }}"
          git push
