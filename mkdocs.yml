site_name: gh-mkpage
site_url: https://mibracy.github.io/gh-mkpage/
repo_url: https://github.com/mibracy/gh-mkpage
edit_uri: edit/main/docs/

theme:
  name: material
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    - navigation.indexes
    - search.highlight
  palette:
    - scheme: slate
      primary: brown
      accent: amber
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
    - scheme: default
      primary: brown
      accent: amber
      toggle:
        icon: material/weather-night
        name: Switch to dark mode

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/prefs.js
  - javascripts/mermaid-zoom.js

nav:
  - Home: index.md
  - Skills:
    - skills/index.md
    - Caveman: skills/caveman-demo.md
    - Create-Readme: skills/create-readme-demo.md
    - Diagnose: skills/diagnose-demo.md
    - Grill-Me: skills/grill-me-demo.md
    - Grill-With-Docs: skills/grill-with-docs-demo.md
    - Mermaid Diagrams: skills/mermaid-diagrams-demo.md
    - Handoff: skills/handoff-demo.md
    - Improve Architecture: skills/improve-codebase-architecture-demo.md
    - Prototype: skills/prototype-demo.md
    - Setup: skills/setup-matt-pocock-skills-demo.md
    - TDD: skills/tdd-demo.md
    - To-Issues: skills/to-issues-demo.md
    - To-PRD: skills/to-prd-demo.md
    - Triage: skills/triage-demo.md
    - Write-A-Skill: skills/write-a-skill-demo.md
    - Zoom-Out: skills/zoom-out-demo.md
  - Updates: updates/index.md

markdown_extensions:
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

plugins:
  - search

docs_dir: docs
site_dir: site
